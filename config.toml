baseURL = "/"
title = "HugoPost"
theme = "etch"
languageCode = "en-US"
relativeURLs = true
enableInlineShortcodes = true
pygmentsCodeFences = true
pygmentsUseClasses = true

[params]
  description = "A clean personal publishing site by haenlau"
  copyright = "Copyright (c) 2026 haenlau"
  dark = "auto"
  highlight = true

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "posts"
    title = "posts"
    url = "/"
    weight = 10

  [[menu.main]]
    identifier = "about"
    name = "about"
    title = "about"
    url = "/about/"
    weight = 20

[permalinks]
  posts = "/:title/"

[markup.goldmark.renderer]
  unsafe = true

[markup.tableOfContents]
  ordered = true
