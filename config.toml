baseURL = "https://blog.air1.cn/"
title = "Air1"
theme = "air1"
languageCode = "zh-CN"
defaultContentLanguage = "zh"
relativeURLs = true
enableRobotsTXT = true
enableInlineShortcodes = true
pygmentsCodeFences = true
pygmentsUseClasses = true

[params]
  description = "Air1，个人博客。不定期更新。"
  copyright = "Part of Air1 Quick Tools · Powered by Cloudflare"
  favicon = "https://pic.air1.cn/file/air1-blog%2F1783563721352_airplane-icon-64.svg"
  dark = "auto"
  highlight = true
  siteAuthor = "Air1"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "post"
    title = "post"
    url = "/"
    weight = 10

  [[menu.main]]
    identifier = "about"
    name = "about"
    title = "about"
    url = "/about/"
    weight = 20

[permalinks]
  posts = "/:title/"

[pagination]
  pagerSize = 10

[markup.goldmark.renderer]
  unsafe = true

[markup.tableOfContents]
  ordered = true
