baseURL = "/"
title = "Air1"
theme = "air1"
languageCode = "zh-CN"
defaultContentLanguage = "zh"
relativeURLs = true
enableInlineShortcodes = true
pygmentsCodeFences = true
pygmentsUseClasses = true

[params]
  description = "Air1 是一个轻量、安静、专注表达的中文发布空间。"
  copyright = "© 2026 Air1"
  dark = "auto"
  highlight = true

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "post"
    title = "post"
    url = "/"
    weight = 10

  [[menu.main]]
    identifier = "about"
    name = "about"
    title = "about"
    url = "/about/"
    weight = 20

[permalinks]
  posts = "/:title/"

[pagination]
  pagerSize = 5

[markup.goldmark.renderer]
  unsafe = true

[markup.tableOfContents]
  ordered = true
